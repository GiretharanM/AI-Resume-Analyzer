<!DOCTYPE html>
<html>
<head>
    <title>Register - AI Analyzer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #0a0a0a; color: #ffffff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #151515; padding: 50px; border-radius: 12px; box-shadow: 0 8px 30px rgba(220, 20, 60, 0.2); border: 1px solid #333; width: 450px; text-align: center; }
        h2 { color: #ff3333; margin-bottom: 30px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; line-height: 1.4; }
        input { width: 90%; padding: 15px; margin: 12px 0; background: #222; border: 1px solid #444; color: white; border-radius: 6px; font-family: 'Poppins', sans-serif; transition: 0.3s; font-size: 15px; box-sizing: border-box; }
        input:focus { border-color: #ff3333; outline: none; box-shadow: 0 0 10px rgba(255, 51, 51, 0.3); }
        button { background: linear-gradient(45deg, #ff3333, #cc0000); color: white; border: none; padding: 15px; width: 90%; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: 600; margin-top: 20px; transition: 0.3s; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 51, 51, 0.4); }
        p { color: #888; font-size: 14px; margin-top: 25px; }
        a { color: #ff3333; text-decoration: none; font-weight: 600; transition: 0.3s; }
        a:hover { text-shadow: 0 0 8px rgba(255, 51, 51, 0.6); }
        .error { color: #ff3333; background: rgba(255, 51, 51, 0.1); padding: 12px; border-radius: 5px; border: 1px solid #ff3333; margin-bottom: 20px; font-size: 14px; width: 90%; margin-left: auto; margin-right: auto; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="box">
        <h2>AI Resume Analyzer &<br>Skill Gap Finder<br><br>Create an Account</h2>
        {% with messages = get_flashed_messages() %}
          {% if messages %}<div class="error">{{ messages[0] }}</div>{% endif %}
        {% endwith %}
        <form action="/register" method="POST">
            <input type="text" name="username" placeholder="Choose Username" required>
            <input type="password" name="password" placeholder="Choose Password" required>
            <button type="submit">REGISTER</button>
        </form>
        <p>Already registered? <a href="/login">Login Here</a></p>
    </div>
</body>
</html>
